<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="Valtikiu Concept — Piezas únicas de edición limitada. Colombia.">
<meta property="og:title" content="Valtikiu Concept">
<meta property="og:description" content="Piezas únicas. Edición limitada.">
<meta property="og:url" content="https://valtikiuconcept.co">
<title>Valtikiu Concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #b8974a;
    --gold-light: #d4af6a;
    --gold-pale: #f0e6cc;
    --bg: #080808;
    --bg-card: #0f0f0d;
    --bg-hover: #14140f;
    --border: #1e1e18;
    --border-gold: rgba(184,151,74,0.35);
    --text-muted: #5a5040;
    --text-dim: #3a3028;
  }

  html, body {
    width: 100%;
    min-height: 100%;
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
  }

  .page {
    width: 100%;
    max-width: 460px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3.5rem 1.5rem 5rem;
    position: relative;
    overflow: hidden;
  }

  /* Subtle background texture */
  .page::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      radial-gradient(ellipse 60% 40% at 50% 20%, rgba(184,151,74,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(184,151,74,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .content { position: relative; z-index: 1; width: 100%; display: flex; flex-direction: column; align-items: center; }

  /* ── Avatar ── */
  .avatar-wrap {
    position: relative;
    width: 96px;
    height: 96px;
    margin-bottom: 1.75rem;
    animation: fadeDown 0.8s ease both;
  }

  .avatar-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid var(--gold);
    opacity: 0.5;
    animation: pulse-ring 3s ease-in-out infinite;
  }

  .avatar-ring-outer {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid var(--border-gold);
    animation: pulse-ring 3s ease-in-out infinite 0.5s;
  }

  .avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #0f0f0d;
    border: 1px solid rgba(184,151,74,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
  }

  .avatar-v {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    letter-spacing: 2px;
  }

  .avatar-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.6;
  }

  /* ── Brand ── */
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 32px;
    letter-spacing: 10px;
    color: var(--gold-pale);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
    animation: fadeDown 0.8s 0.1s ease both;
  }

  .brand-concept {
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 8px;
    color: var(--text-muted);
    text-transform: uppercase;
    text-align: center;
    animation: fadeDown 0.8s 0.2s ease both;
  }

  .ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.75rem 0;
    animation: fadeDown 0.8s 0.3s ease both;
  }

  .ornament-line {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .ornament-diamond {
    width: 5px;
    height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.8;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 15px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 3rem;
    animation: fadeDown 0.8s 0.35s ease both;
  }

  /* ── Links ── */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-item {
    animation: fadeUp 0.6s ease both;
  }

  .link-item:nth-child(1) { animation-delay: 0.4s; }
  .link-item:nth-child(2) { animation-delay: 0.5s; }
  .link-item:nth-child(3) { animation-delay: 0.6s; }

  .link-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    height: 60px;
    padding: 0 1.5rem;
    border-radius: 2px;
    text-decoration: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, border-color 0.3s ease;
  }

  .link-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .link-btn:hover { transform: translateY(-2px); }
  .link-btn:hover::after { opacity: 1; }
  .link-btn:active { transform: scale(0.98) translateY(0); }

  /* WhatsApp — gold solid */
  .btn-wa {
    background: linear-gradient(135deg, #b8974a 0%, #d4af6a 50%, #b8974a 100%);
    background-size: 200%;
    border: none;
    transition: background-position 0.5s ease, transform 0.2s ease;
  }
  .btn-wa:hover { background-position: right center; }
  .btn-wa::after { background: rgba(255,255,255,0.06); }
  .btn-wa .lbl { color: #080808; font-weight: 500; font-size: 10px; letter-spacing: 3.5px; }
  .btn-wa .ico { color: #080808; opacity: 0.7; }

  /* Web — dark outlined */
  .btn-web {
    background: var(--bg-card);
    border: 1px solid var(--border-gold);
  }
  .btn-web:hover { border-color: var(--gold); background: var(--bg-hover); }
  .btn-web::after { background: rgba(184,151,74,0.04); }
  .btn-web .lbl { color: #c8b888; font-weight: 300; font-size: 10px; letter-spacing: 3.5px; }
  .btn-web .ico { color: var(--gold); }

  .btn-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .btn-sep {
    width: 1px;
    height: 20px;
    background: currentColor;
    opacity: 0.2;
    flex-shrink: 0;
  }

  .btn-wa .btn-sep { color: #080808; }
  .btn-web .btn-sep { color: var(--gold); }

  .lbl {
    font-family: 'Montserrat', sans-serif;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 3.5px;
  }

  .ico {
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
  }

  .arrow {
    font-size: 12px;
    opacity: 0.6;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 8px;
    letter-spacing: 5px;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
    margin: 2.5rem 0 1.25rem;
    animation: fadeDown 0.8s 0.55s ease both;
  }

  /* ── Footer ── */
  .footer {
    margin-top: 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: fadeDown 0.8s 0.8s ease both;
  }

  .footer-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .footer-divider {
    width: 20px;
    height: 1px;
    background: var(--border-gold);
  }

  .footer-country {
    font-size: 8px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse-ring {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50%       { opacity: 0.6; transform: scale(1.03); }
  }

  /* ── Mobile fine-tuning ── */
  @media (max-width: 380px) {
    .brand-name { font-size: 26px; letter-spacing: 7px; }
    .link-btn { height: 56px; padding: 0 1.25rem; }
    .lbl { font-size: 9px; letter-spacing: 2.5px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="content">

    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar-ring-outer"></div>
      <div class="avatar-ring"></div>
      <div class="avatar-inner">
        <span class="avatar-v">V</span>
        <div class="avatar-dot"></div>
      </div>
    </div>

    <!-- Brand -->
    <h1 class="brand-name">Valtikiu</h1>
    <p class="brand-concept">Concept</p>

    <!-- Ornament -->
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>

    </div>

    <p class="tagline">Piezas únicas. Edición limitada.</p>

    <!-- Links -->
    <div class="links">

      <!-- WhatsApp -->
      <div class="link-item">
        <a class="link-btn btn-wa"

          <div class="btn-left">

      </div>

      <!-- Web -->
      <div class="link-item">
        <a class="link-btn btn-web"
           href="https://valtikiuconcept.co"
           target="_blank"
           rel="noopener">
          <div class="btn-left">
            <svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
            </svg>
            <div class="btn-sep"></div>
            <span class="lbl">Ver tienda online</span>
          </div>
          <span class="arrow lbl">→</span>
        </a>
      </div>

    </div>

    <!-- Footer -->
    <div class="footer">
      <p class="footer-brand">Valtikiu Concept</p>
      <div class="footer-divider"></div>
      <p class="footer-country">Colombia · Edición Limitada</p>
    </div>

  </div>
</div>
</body>
</html>
