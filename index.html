<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valtikiu Concept</title>
  <meta name="description" content="Prendas exclusivas con unidades limitadas. Moda femenina colombiana." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      padding: 2.5rem 1.25rem 3rem;
      width: 100%;
    }

    .page {
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo */
    .logo-wrap {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 1.5px solid #c9a84c;
      overflow: hidden;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .logo-wrap img {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }

    /* Name & tagline */
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: #c9a84c;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 6px;
    }

    .brand-tagline {
      font-size: 9px;
      font-weight: 300;
      color: #666;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 2rem;
    }

    /* Divider */
    .divider {
      width: 36px;
      height: 1px;
      background: #c9a84c;
      opacity: 0.35;
      margin-bottom: 2rem;
    }

    /* Buttons */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .btn svg {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
    }

    /* Primary — WhatsApp */
    .btn-primary {
      background: transparent;
      border: 1px solid #c9a84c;
      color: #c9a84c;
    }

    .btn-primary:hover {
      background: #c9a84c;
      color: #0a0a0a;
    }

    /* Secondary */
    .btn-secondary {
      background: #111;
      border: 1px solid #222;
      color: #888;
    }

    .btn-secondary:hover {
      border-color: rgba(201,168,76,0.35);
      color: #c9a84c;
    }

    /* Footer */
    .footer {
      margin-top: 2.5rem;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: #333;
      text-transform: uppercase;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="page">

    <div class="logo-wrap">
      <img
        src="https://valtikiuconcept.co/cdn/shop/files/LOGO_Mesa_de_trabajo_1.png?v=1773149111&width=260"
        alt="Valtikiu Concept"
        onerror="this.outerHTML='<span style=\'font-family:Cormorant Garamond,serif;font-size:36px;color:#c9a84c;font-weight:300;\'>V</span>'"
      />
    </div>

    <h1 class="brand-name">Valtikiu Concept</h1>
    <p class="brand-tagline">Prendas exclusivas &middot; Unidades limitadas</p>
    <div class="divider"></div>

    <nav class="links" aria-label="Enlaces principales">

      <!-- WhatsApp -->
      <a class="btn btn-primary"
         href="https://wa.me/573235212014?text=Hola%2C%20vi%20su%20perfil%20y%20quiero%20m%C3%A1s%20informaci%C3%B3n"
         target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 21l1.65-3.8a9 9 0 1 1 3.4 2.9L3 21"/>
          <path d="M9 10c.5 1 1 2 2 2.5s2 .5 3-.5"/>
        </svg>
        Escríbenos por WhatsApp
      </a>

      <!-- Tienda -->
      <a class="btn btn-secondary"
         href="https://valtikiuconcept.co/"
         target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        Ver tienda online
      </a>

      <!-- Nueva colección -->
      <a class="btn btn-secondary"
         href="https://valtikiuconcept.co/collections/nueva-coleccion"
         target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        Nueva colección
      </a>

      <!-- Temporadas anteriores -->
      <a class="btn btn-secondary"
         href="https://valtikiuconcept.co/collections/temporadas-anteriores"
         target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
          <line x1="7" y1="7" x2="7.01" y2="7"/>
        </svg>
        Temporadas anteriores &middot; 70% off
      </a>

    </nav>

    <p class="footer">&copy; 2026 Valtikiu Concept &mdash; Colombia</p>

  </main>
</body>
</html>
